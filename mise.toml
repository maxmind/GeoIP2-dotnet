[settings]
experimental = true
lockfile = true
disable_backends = [
    "asdf",
    "vfox",
]

[tools]
dotnet = ["latest", "9", "8"]
hugo = "latest"
"github:houseabsolute/precious" = "latest"
lychee = "latest"
node = "latest"
"npm:prettier" = "latest"

[tasks.build-docs]
description = "Build the docs site with Hugo"
run = "hugo --source docs --minify"

[tasks.serve-docs]
description = "Serve the docs site locally with Hugo dev server"
run = "hugo server --source docs"

[tasks.check-links]
description = "Check links with lychee"
run = "lychee --no-progress './**/*.md' './**/*.cs' './MaxMind.GeoIP2/MaxMind.GeoIP2.csproj'"

[hooks]
enter = "mise install --quiet --locked"

[[watch_files]]
patterns = ["mise.toml", "mise.lock"]
run = "mise install --quiet --locked"
